<style>
:root,[data-theme="light"]{
  --pr:#c9a227;--pr2:#e8c252;--dk:#0a0a0a;--gld:linear-gradient(135deg,#c9a227,#f0d060,#c9a227);
  --bg:#faf7f0;--bg2:#f5f0e6;--bg3:#ede8da;--surface:#fff;--surface2:#f9f5eb;--surface3:#f0ebd8;
  --text:#1a140a;--muted:#7a6040;--border:rgba(150,110,30,.18);--divider:rgba(150,110,30,.10);
  --shadow-sm:0 8px 24px rgba(100,70,10,.10);--shadow-md:0 18px 48px rgba(100,70,10,.14);--shadow-lg:0 32px 72px rgba(100,70,10,.18);
  --r:20px;--rf:999px;--wrap:1000px;
}
[data-theme="dark"]{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;--surface:#1e1e1e;--surface2:#252525;--surface3:#2e2e2e;
  --text:#f5f0e8;--muted:#a89880;--border:rgba(201,162,39,.18);--divider:rgba(201,162,39,.10);
  --shadow-sm:0 8px 24px rgba(0,0,0,.45);--shadow-md:0 18px 48px rgba(0,0,0,.55);--shadow-lg:0 32px 72px rgba(0,0,0,.65);
}
*{box-sizing:border-box;margin:0;padding:0} html{scroll-behavior:smooth}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:inherit;text-decoration:none} button,input,select{font:inherit;color:inherit} button{cursor:pointer;border:0;background:none}
:focus-visible{outline:2px solid var(--pr);outline-offset:3px;border-radius:6px}
.container{width:min(calc(100% - 2rem),var(--wrap));margin:auto}

.hdr{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--divider)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:72px;height:72px;border-radius:18px;display:grid;place-items:center;background:var(--gld);font-size:20px}
.logo-text{font-family:'Baloo 2',cursive;font-size:30px;font-weight:900;background:var(--gld);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-actions{display:flex;gap:10px;align-items:center}
.icon-btn{width:46px;height:46px;border-radius:var(--rf);border:1px solid var(--border);display:grid;place-items:center;background:var(--surface)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;padding:0 18px;border-radius:var(--rf);font-size:14px;font-weight:800;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-2px)}
.btn-gold{background:var(--gld);color:#0a0a0a;box-shadow:var(--shadow-md)}
.btn-outline{border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow-sm)}
.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:14px;font-weight:700;padding:10px 0;transition:color .15s}
.back-link:hover{color:var(--pr)}

.product-hero{padding:32px 0 0}
.product-hero-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:28px;align-items:start}
.product-icon-big{width:80px;height:80px;border-radius:22px;display:grid;place-items:center;font-size:38px;background:var(--surface2);border:1px solid var(--border);margin-bottom:16px;overflow:hidden;}
.product-hero h1{font-family:'Baloo 2',cursive;font-size:clamp(32px,5vw,54px);font-weight:900;line-height:1;margin-bottom:8px}
.product-hero h1 span{background:var(--gld);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.product-subtitle{font-size:18px;color:var(--muted);margin-bottom:14px}
.product-cat-tag{display:inline-flex;padding:7px 14px;border-radius:var(--rf);background:color-mix(in srgb,var(--pr) 12%,var(--surface2));color:var(--pr);font-size:13px;font-weight:800;border:1px solid var(--border);margin-bottom:18px}
.features-list{display:grid;gap:10px;list-style:none;margin-bottom:24px}
.features-list li{display:flex;gap:10px;font-size:15px;color:var(--muted)}
.features-list li::before{content:'✔';color:var(--pr);font-weight:900;font-size:16px}

.plans-panel{background:var(--surface);border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow-lg);padding:24px;position:sticky;top:88px}
.plans-panel h2{font-family:'Baloo 2',cursive;font-size:26px;font-weight:900;margin-bottom:4px}
.plans-panel p{color:var(--muted);font-size:14px;margin-bottom:18px}
.plans-grid{display:grid;gap:12px}
.plan-option{padding:18px;border-radius:18px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .18s;position:relative}
.plan-option:hover,.plan-option.selected{border-color:var(--pr);background:color-mix(in srgb,var(--pr) 8%,var(--surface))}
.plan-option.selected::after{content:'✔';position:absolute;top:14px;right:16px;color:var(--pr);font-weight:900;font-size:18px}
.plan-duration{font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.plan-price{font-family:'Baloo 2',cursive;font-size:36px;font-weight:900;line-height:1;margin-top:4px}
.plan-price span{font-size:15px;font-weight:600;color:var(--muted);font-family:Inter,sans-serif}
.plan-best{display:inline-flex;margin-top:6px;padding:4px 9px;border-radius:var(--rf);background:var(--gld);color:#0a0a0a;font-size:11px;font-weight:900}
.order-btn{width:100%;min-height:54px;margin-top:16px;border-radius:var(--rf);background:var(--gld);color:#0a0a0a;font-size:16px;font-weight:900;box-shadow:var(--shadow-md);transition:opacity .15s,transform .15s}
.order-btn:hover{opacity:.88;transform:translateY(-2px)}
.wa-note{text-align:center;font-size:13px;color:var(--muted);margin-top:10px}
.unavail{color:var(--muted);font-size:14px;padding:14px;border-radius:14px;background:var(--surface3);border:1px dashed var(--border);text-align:center}

.wa-float{position:fixed;bottom:24px;right:24px;z-index:50;width:60px;height:60px;border-radius:var(--rf);background:#25D366;display:grid;place-items:center;box-shadow:var(--shadow-lg);transition:transform .18s}
.wa-float:hover{transform:scale(1.08)}
.related{padding:48px 0 64px}
.related h2{font-family:'Baloo 2',cursive;font-size:34px;font-weight:900;margin-bottom:16px}
.related-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.related-card{padding:16px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:transform .18s,border-color .18s}
.related-card:hover{transform:translateY(-4px);border-color:var(--pr)}
.related-card h4{font-size:15px;font-weight:800;margin-top:8px}
.related-card p{font-size:13px;color:var(--muted);margin-top:3px}

.not-found{padding:80px 0;text-align:center}
.not-found h2{font-family:'Baloo 2',cursive;font-size:42px;margin-bottom:12px}
.not-found p{color:var(--muted);margin-bottom:20px}

@media(max-width:768px){.product-hero-grid{grid-template-columns:1fr} .plans-panel{position:static} .related-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.related-grid{grid-template-columns:1fr}}
</style>

const durations = ['1 Month','3 Months','6 Months','1 Year'];
const bestValue = {'3 Months':'Good deal','6 Months':'Best value','1 Year':'Best price'};

let selectedDuration = null;
let currentProduct = null;

function getProduct(id) { return products.find(p => p.id === id); }

function getStartingPrice(p) {
  for (const d of durations) { if (p.prices[d]) return p.prices[d]; }
  return null;
}

function buildOrderMessage(product, duration, price) {
  return encodeURIComponent(
    `🛒 NEW ORDER – ELITE-SUBS\n` +
    `━━━━━━━━━━━━━━━━━━\n` +
    `📦 Product: ${product.name}\n` +
    `📋 Plan: ${product.subtitle}\n` +
    `⏱ Duration: ${duration}\n` +
    `💰 Price: ${price}\n`
  );
}

function renderProduct(p) {
  document.title = p.name + ' | ELITE-SUBS';
  currentProduct = p;
  const availPlans = Object.keys(p.prices).filter(d => p.prices[d]);
  if (!selectedDuration || !availPlans.includes(selectedDuration)) {
    selectedDuration = availPlans[0] || null;
  }

  const plansHTML = availPlans.length
    ? availPlans.map(d => `
      <div class="plan-option ${selectedDuration===d?'selected':''}" data-dur="${d}" role="radio" tabindex="0" aria-checked="${selectedDuration===d}">
        <div class="plan-duration">${d}</div>
        <div class="plan-price">${p.prices[d]}</div>
        ${bestValue[d] ? `<span class="plan-best">${bestValue[d]}</span>` : ''}
      </div>`).join('')
    : '<div class="unavail">No plans currently available for this product.</div>';

  const waMsg = selectedDuration && p.prices[selectedDuration]
    ? buildOrderMessage(p, selectedDuration, p.prices[selectedDuration]) : '';

  const relatedProducts = products.filter(r => r.category === p.category && r.id !== p.id).slice(0,4);

  document.getElementById('productContent').innerHTML = `
    <section class="product-hero">
      <div class="container product-hero-grid">
        <div>
          <div class="product-icon-big" style="background:none;border:1px solid var(--border);padding:6px;">${productLogos[p.id] ? `<img src="${productLogos[p.id]}" alt="${p.name}" style="width:60px;height:60px;object-fit:contain;border-radius:12px;" onerror="this.style.display='none';this.parentElement.textContent='${p.icon}'">` : p.icon}</div>
          <span class="product-cat-tag">${p.category}</span>
          <h1>${p.name} <span></span></h1>
          <div class="product-subtitle">${p.subtitle}</div>
          <ul class="features-list">
            ${p.features.map(f => `<li>${f}</li>`).join('')}
          </ul>
        </div>
        <div>
          <div class="plans-panel">
            <h2>Choose your plan</h2>
            <p>Select a duration and order instantly via WhatsApp</p>
            <div class="plans-grid" id="plansGrid">${plansHTML}</div>
            ${availPlans.length ? `
              <a id="orderBtn" style="min-height:64px;font-size:19px;padding:0 36px;width:100%;justify-content:center;background:#25D366;color:#fff;border:none;" class="order-btn" href="https://wa.me/96181943935?text=${waMsg}" target="_blank" rel="noopener">
                💬 Order on WhatsApp
              </a>
              <div class="wa-note">We reply and deliver fast · +961 81943935</div>
            ` : ''}
          </div>
        </div>
      </div>
    </section>
    ${relatedProducts.length ? `
    <section class="related">
      <div class="container">
        <h2>More in ${p.category}</h2>
        <div class="related-grid">
          ${relatedProducts.map(r => `
            <div class="related-card" onclick="location.href='product.html?id=${r.id}'" tabindex="0" role="button">
              <div style="font-size:28px">${r.icon}</div>
              <h4>${r.name}</h4>
              <p>${getStartingPrice(r) ? 'From '+getStartingPrice(r) : r.subtitle}</p>
            </div>`).join('')}
        </div>
      </div>
    </section>` : ''}
  `;

  document.querySelectorAll('.plan-option').forEach(el => {
    el.addEventListener('click', () => selectDuration(el.dataset.dur));
    el.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') selectDuration(el.dataset.dur); });
  });
}

function selectDuration(dur) {
  if (!currentProduct) return;
  selectedDuration = dur;
  document.querySelectorAll('.plan-option').forEach(el => {
    const isSelected = el.dataset.dur === dur;
    el.classList.toggle('selected', isSelected);
    el.setAttribute('aria-checked', isSelected);
  });
  const price = currentProduct.prices[dur];
  if (price) {
    const msg = buildOrderMessage(currentProduct, dur, price);
    const btn = document.getElementById('orderBtn');
    if (btn) btn.href = `https://wa.me/96181943935?text=${msg}`;
  }
}

function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const product = id ? getProduct(id) : null;
  if (!product) {
    document.getElementById('productContent').innerHTML = `
      <div class="not-found container">
        <h2>Product not found</h2>
        <p>The product you're looking for doesn't exist.</p>
        <a class="btn btn-gold" href="index.html">Browse all products</a>
      </div>`;
    return;
  }
  renderProduct(product);
}

const themeToggle = document.getElementById('themeToggle');
let theme = localStorage.getItem('es-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
document.documentElement.setAttribute('data-theme', theme);
themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
themeToggle.addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('es-theme', theme);
});
updateCartBadge();
</script>
