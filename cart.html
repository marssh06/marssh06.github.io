<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Your Cart — ELITE-SUBS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{--pr:#c9a227;--pr2:#e8c252;--dk:#0a0a0a;--gld:linear-gradient(135deg,#c9a227,#f0d060,#c9a227);--bg:#faf7f0;--bg2:#f5f0e6;--bg3:#ede8da;--surface:#fff;--surface2:#f9f5eb;--surface3:#f0ebd8;--text:#1a140a;--muted:#7a6040;--border:rgba(150,110,30,.18);--divider:rgba(150,110,30,.10);--shadow-sm:0 8px 24px rgba(100,70,10,.10);--shadow-md:0 18px 48px rgba(100,70,10,.14);--shadow-lg:0 32px 72px rgba(100,70,10,.18);--r:20px;--rf:999px;--wrap:900px}
[data-theme="dark"]{--bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;--surface:#1e1e1e;--surface2:#252525;--surface3:#2e2e2e;--text:#f5f0e8;--muted:#a89880;--border:rgba(201,162,39,.18);--divider:rgba(201,162,39,.10);--shadow-sm:0 8px 24px rgba(0,0,0,.45);--shadow-md:0 18px 48px rgba(0,0,0,.55);--shadow-lg:0 32px 72px rgba(0,0,0,.65)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:inherit;text-decoration:none}
button,input{font:inherit;color:inherit}
button{cursor:pointer;border:0;background:none}
button:focus-visible{outline:2px solid var(--pr);outline-offset:3px;border-radius:6px}
.container{width:min(calc(100% - 2rem),var(--wrap));margin:auto}

/* HEADER */
.hdr{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--divider)}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;background:var(--gld);font-size:20px;overflow:hidden}
.logo-text{font-family:'Baloo 2',cursive;font-size:24px;font-weight:900;background:var(--gld);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-actions{display:flex;gap:10px;align-items:center}
.icon-btn{width:46px;height:46px;border-radius:var(--rf);border:1px solid var(--border);display:grid;place-items:center;background:var(--surface);font-size:18px;position:relative}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:46px;padding:0 18px;border-radius:var(--rf);font-size:14px;font-weight:800;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-2px)}
.btn-gold{background:var(--gld);color:#0a0a0a;box-shadow:var(--shadow-md)}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--pr);color:#fff;font-size:11px;font-weight:800;width:18px;height:18px;border-radius:50%;display:none;place-items:center;line-height:1}
.back-link{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:14px;font-weight:700;padding:10px 0;transition:color .15s}
.back-link:hover{color:var(--pr)}

/* PAGE */
.page{padding:32px 0 80px}
.page-title{font-family:'Baloo 2',cursive;font-size:clamp(28px,5vw,44px);font-weight:900;margin-bottom:4px}
.page-title span{background:var(--gld);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-sub{color:var(--muted);font-size:15px;margin-bottom:32px}

/* CART LAYOUT */
.cart-grid{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}
@media(max-width:720px){.cart-grid{grid-template-columns:1fr}}

/* CART ITEMS */
.cart-items-panel{display:flex;flex-direction:column;gap:14px}
.cart-item{display:flex;align-items:center;gap:16px;padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:border-color .18s}
.cart-item:hover{border-color:var(--pr)}
.item-icon{width:54px;height:54px;border-radius:14px;background:var(--surface2);border:1px solid var(--border);display:grid;place-items:center;font-size:26px;overflow:hidden;flex-shrink:0}
.item-icon img{width:38px;height:38px;object-fit:contain;border-radius:8px}
.item-info{flex:1;min-width:0}
.item-name{font-weight:800;font-size:15px}
.item-meta{color:var(--muted);font-size:13px;margin-top:2px}
.item-price{font-family:'Baloo 2',cursive;font-size:22px;font-weight:900;white-space:nowrap}
.item-qty{display:flex;align-items:center;gap:8px;margin-top:6px}
.qty-btn{width:28px;height:28px;border-radius:var(--rf);border:1px solid var(--border);background:var(--surface2);font-size:16px;font-weight:700;display:grid;place-items:center;transition:background .15s}
.qty-btn:hover{background:var(--bg3)}
.qty-num{font-weight:700;font-size:14px;min-width:20px;text-align:center}
.remove-btn{color:var(--muted);font-size:18px;padding:6px;border-radius:8px;transition:color .15s}
.remove-btn:hover{color:#e05555}

.empty-cart{text-align:center;padding:64px 0}
.empty-cart .ec-icon{font-size:56px;margin-bottom:16px}
.empty-cart h2{font-family:'Baloo 2',cursive;font-size:28px;font-weight:900;margin-bottom:8px}
.empty-cart p{color:var(--muted);margin-bottom:20px}

/* SUMMARY PANEL */
.summary-panel{background:var(--surface);border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow-lg);padding:24px;position:sticky;top:88px}
.summary-panel h2{font-family:'Baloo 2',cursive;font-size:22px;font-weight:900;margin-bottom:16px}
.summary-row{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--divider)}
.summary-row:last-of-type{border-bottom:none}
.summary-total{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:14px;border-top:2px solid var(--border)}
.summary-total span:first-child{font-weight:800;font-size:15px}
.summary-total span:last-child{font-family:'Baloo 2',cursive;font-size:30px;font-weight:900;background:var(--gld);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.wa-order-btn{width:100%;min-height:56px;margin-top:16px;border-radius:var(--rf);background:#25D366;color:#fff;border:none;font-size:16px;font-weight:900;box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;gap:10px;transition:opacity .15s,transform .15s}
.wa-order-btn:hover{opacity:.88;transform:translateY(-2px)}
.wa-order-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.clear-btn{width:100%;margin-top:10px;padding:10px;border-radius:var(--rf);border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:700;transition:color .15s,border-color .15s}
.clear-btn:hover{color:#e05555;border-color:#e05555}
.wa-note{text-align:center;font-size:12px;color:var(--muted);margin-top:10px}

/* WA FLOAT */
.wa-float{position:fixed;bottom:24px;right:24px;z-index:50;width:60px;height:60px;border-radius:var(--rf);background:#25D366;display:grid;place-items:center;box-shadow:var(--shadow-lg);transition:transform .18s}
.wa-float:hover{transform:scale(1.08)}
</style>
</head>
<body>
<header class="hdr">
  <div class="container hdr-row">
    <a class="logo" href="index.html">
      <div class="logo-mark" style="background:none;padding:0;overflow:hidden;width:52px;height:52px;border-radius:14px">
        <img src="data:image/webp;base64,UklGRqwFAABXRUJQVlA4IKAFAAAQJACdASp4AHgAPjEYi0QiIauRCgTcuAMEtLd1oAXqABQRRYABQAA=" alt="ELITE-SUBS" style="width:52px;height:52px;border-radius:14px;object-fit:cover;display:block">
      </div>
      <div class="logo-text">ELITE-SUBS</div>
    </a>
    <div class="hdr-actions">
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">🌙</button>
      <a class="icon-btn" href="cart.html" aria-label="Cart" style="position:relative">🛒<span class="cart-badge" id="cartBadge"></span></a>
    </div>
  </div>
</header>

<main>
  <div class="container page">
    <a class="back-link" href="index.html">← Back to all products</a>
    <h1 class="page-title">Your <span>Cart</span></h1>
    <p class="page-sub" id="cartSubtitle">Loading...</p>

    <div class="cart-grid">
      <div class="cart-items-panel" id="cartItems"></div>
      <div class="summary-panel" id="summaryPanel">
        <h2>Order Summary</h2>
        <div id="summaryRows"></div>
        <div class="summary-total">
          <span>Total</span>
          <span id="summaryTotal">$0.00</span>
        </div>
        <a id="waOrderBtn" class="wa-order-btn" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="white" width="22" height="22"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Order on WhatsApp
        </a>
        <button class="clear-btn" id="clearBtn">🗑 Clear cart</button>
        <p class="wa-note">We reply and deliver fast · 961 81943935</p>
      </div>
    </div>
  </div>
</main>

<a class="wa-float" href="https://wa.me/96181943935?text=Hi%20ELITE-SUBS%2C%20I%27d%20like%20to%20browse%20your%20products!" target="_blank" rel="noopener" aria-label="WhatsApp">
  <svg viewBox="0 0 24 24" fill="white" width="32" height="32"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script src="cart.js"></script>
<script>
const productLogos = {
  'chatgpt-pro':'https://cdn.oaistatic.com/assets/favicon-o20kmmos.svg','chatgpt-business':'https://cdn.oaistatic.com/assets/favicon-o20kmmos.svg','chatgpt-plus':'https://cdn.oaistatic.com/assets/favicon-o20kmmos.svg','chatgpt-go':'https://cdn.oaistatic.com/assets/favicon-o20kmmos.svg','chatgpt-plus-shared':'https://cdn.oaistatic.com/assets/favicon-o20kmmos.svg','netflix-1user':'https://assets.nflxext.com/ffe/siteui/common/icons/nficon2016.ico','netflix-3users':'https://assets.nflxext.com/ffe/siteui/common/icons/nficon2016.ico','spotify':'https://open.spotifycdn.com/cdn/images/favicon32.b64ecc03.png','google-ai-pro':'https://ssl.gstatic.com/images/branding/product/1x/googleg_32dp.png','google-ai-ultra':'https://ssl.gstatic.com/images/branding/product/1x/googleg_32dp.png','cursor':'https://www.cursor.com/favicon.ico'
};

function renderCart() {
  const cart = getCart();
  const itemsEl = document.getElementById('cartItems');
  const rowsEl = document.getElementById('summaryRows');
  const totalEl = document.getElementById('summaryTotal');
  const subtitle = document.getElementById('cartSubtitle');
  const waBtn = document.getElementById('waOrderBtn');
  const clearBtn = document.getElementById('clearBtn');

  if (!cart.length) {
    itemsEl.innerHTML = `<div class="empty-cart"><div class="ec-icon">🛒</div><h2>Your cart is empty</h2><p>Add products from the store to get started.</p><a class="btn btn-gold" href="index.html">Browse products</a></div>`;
    rowsEl.innerHTML = '';
    totalEl.textContent = '$0.00';
    subtitle.textContent = 'No items yet';
    waBtn.href = '#';
    waBtn.style.pointerEvents = 'none';
    waBtn.style.opacity = '.4';
    clearBtn.style.display = 'none';
    return;
  }

  subtitle.textContent = `${cartCount()} item${cartCount()===1?'':'s'} in your cart`;
  waBtn.style.pointerEvents = '';
  waBtn.style.opacity = '';
  clearBtn.style.display = '';
  waBtn.href = `https://wa.me/96181943935?text=${buildCartWhatsAppMsg()}`;

  itemsEl.innerHTML = cart.map(item => {
    const logo = productLogos[item.id];
    const iconHtml = logo
      ? `<img src="${logo}" alt="${item.name}" onerror="this.style.display='none';this.parentElement.textContent='${item.icon||'📦'}'">` 
      : (item.icon || '📦');
    return `
    <div class="cart-item">
      <div class="item-icon">${iconHtml}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">${item.duration}</div>
        <div class="item-qty">
          <button class="qty-btn" onclick="changeQty('${item.id}','${item.duration}',-1)">−</button>
          <span class="qty-num">${item.qty||1}</span>
          <button class="qty-btn" onclick="changeQty('${item.id}','${item.duration}',1)">+</button>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <div class="item-price">$${(item.price*(item.qty||1)).toFixed(2)}</div>
        <button class="remove-btn" onclick="removeFromCart('${item.id}','${item.duration}');renderCart()" title="Remove">✕</button>
      </div>
    </div>`;
  }).join('');

  rowsEl.innerHTML = cart.map(item =>
    `<div class="summary-row"><span>${item.name} × ${item.qty||1}</span><span>$${(item.price*(item.qty||1)).toFixed(2)}</span></div>`
  ).join('');

  totalEl.textContent = `$${cartTotal().toFixed(2)}`;
}

function changeQty(id, duration, delta) {
  const cart = getCart();
  const item = cart.find(i => i.id===id && i.duration===duration);
  if (!item) return;
  item.qty = Math.max(1, (item.qty||1) + delta);
  saveCart(cart);
  renderCart();
}

document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm('Clear your entire cart?')) { clearCart(); renderCart(); }
});

// Theme
const themeToggle = document.getElementById('themeToggle');
let theme = localStorage.getItem('es-theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
document.documentElement.setAttribute('data-theme', theme);
themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
themeToggle.addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('es-theme', theme);
});

updateCartBadge();
renderCart();
</script>
</body>
</html>
